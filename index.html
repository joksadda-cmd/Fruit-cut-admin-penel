<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fruit Cut - Admin Panel</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&family=Nunito:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #004050;
            --bg-card: rgba(10, 40, 50, 0.95);
            --primary: #ffcc00;
            --primary-dark: #cc9900;
            --secondary: #00c6d4;
            --text-main: #ffffff;
            --text-muted: #aadddd;
            --border-color: rgba(100, 200, 220, 0.3);
            --success: #4caf50;
            --success-dark: #2e7d32;
            --danger: #ff3355;
            --danger-dark: #cc0033;
            --purple: #9c27b0;
            --btn-shadow: 0 4px 0;
        }

        body {
            font-family: 'Nunito', sans-serif;
            background: linear-gradient(180deg, #0a8fa0 0%, #006070 40%, #004050 100%);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            min-height: 100vh;
        }

        h1, h2, h3, .luckiest {
            font-family: 'Luckiest Guy', cursive;
            letter-spacing: 1px;
            font-weight: normal;
            margin: 0;
            text-shadow: 2px 3px 0 rgba(0,0,0,0.4);
        }

        /* --- LOGIN SCREEN --- */
        #login-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 30, 40, 0.9); z-index: 9999;
            display: flex; justify-content: center; align-items: center;
        }
        .login-box {
            background: linear-gradient(160deg, #0d3040, #071e28);
            padding: 40px; border-radius: 24px;
            width: 90%; max-width: 380px; text-align: center;
            border: 3px solid var(--border-color);
            box-shadow: 0 20px 60px rgba(0,0,0,0.8), inset 0 1px 0 rgba(255,255,255,0.05);
        }
        .login-box h2 { color: var(--primary); font-size: 32px; margin-bottom: 20px; }
        .login-box input {
            width: 100%; padding: 14px; margin: 10px 0;
            background: rgba(255,255,255,0.1); border: 2px solid var(--border-color); 
            color: white; border-radius: 12px; box-sizing: border-box; font-family: 'Nunito', sans-serif; font-weight: bold; outline: none;
        }
        .login-box input:focus { border-color: var(--primary); }

        /* --- BUTTONS --- */
        .btn {
            padding: 10px 15px; border: none; border-radius: 12px; cursor: pointer; 
            font-family: 'Nunito', sans-serif; font-weight: 900; font-size: 14px; 
            color: white; transition: transform 0.1s, box-shadow 0.1s; text-align: center;
        }
        .btn:active { transform: translateY(4px); box-shadow: none !important; }
        
        .btn-gold { background: linear-gradient(180deg,#ffe040,#ff8c00); box-shadow: var(--btn-shadow) #cc6600; text-shadow: 1px 2px 0 rgba(0,0,0,0.3); }
        .btn-red { background: linear-gradient(180deg,#ff3355,#cc0033); box-shadow: var(--btn-shadow) #880022; }
        .btn-green { background: linear-gradient(180deg,#4caf50,#2e7d32); box-shadow: var(--btn-shadow) #1b5e20; }
        .btn-blue { background: linear-gradient(180deg,#1976d2,#0d47a1); box-shadow: var(--btn-shadow) #002171; }
        .btn-purple { background: linear-gradient(180deg,#9c27b0,#6a0080); box-shadow: var(--btn-shadow) #4a0060; }
        .btn-dark { background: linear-gradient(180deg,#546e7a,#37474f); box-shadow: var(--btn-shadow) #1c313a; }

        /* --- ADMIN LAYOUT --- */
        #admin-content { display: none; max-width: 1400px; margin: 0 auto; padding: 20px; }

        .admin-header {
            display: flex; justify-content: space-between; align-items: center;
            padding-bottom: 20px; border-bottom: 2px dashed rgba(255,255,255,0.2); margin-bottom: 30px;
        }

        .nav-buttons { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 25px; }
        .nav-btn {
            background: rgba(255,255,255,0.1); border: 2px solid transparent; color: var(--text-muted);
            padding: 12px 20px; cursor: pointer; border-radius: 14px; font-weight: 800; transition: all 0.2s;
            font-family: 'Nunito', sans-serif;
        }
        .nav-btn:hover { background: rgba(255,255,255,0.2); }
        .nav-btn.active { background: linear-gradient(180deg,#00c6d4,#007a8a); color: white; border-color: #fff; box-shadow: 0 4px 0 #005060; transform: translateY(-2px); }

        .admin-section { display: none; animation: fadeIn 0.3s; }
        .admin-section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* --- CARDS & GRID --- */
        .dashboard-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 20px; }
        .dash-card { 
            background: var(--bg-card); padding: 25px; border-radius: 20px; 
            border: 2px solid var(--border-color); text-align: center; box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }
        .dash-card .count { font-size: 42px; color: var(--primary); margin: 10px 0; font-family: 'Luckiest Guy', cursive; text-shadow: 2px 3px 0 rgba(0,0,0,0.5); }
        .dash-card h3 { color: var(--secondary); font-size: 20px; }
        
        .grid-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 20px; margin-top: 15px;}
        .card-item {
            background: var(--bg-card); border: 2px solid var(--border-color);
            border-radius: 20px; padding: 20px; display: flex; flex-direction: column; gap: 12px;
            box-shadow: 0 8px 15px rgba(0,0,0,0.3); position: relative;
        }
        .card-item.banned-user { border-color: var(--danger); opacity: 0.8; }

        .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 5px; }
        .username { font-size: 20px; font-weight: 900; color: var(--primary); }
        .userid { font-size: 12px; color: var(--text-muted); font-family: monospace; background: rgba(0,0,0,0.3); padding: 2px 6px; border-radius: 6px;}
        
        .card-stats { background: rgba(0,0,0,0.4); padding: 12px; border-radius: 12px; display: flex; flex-direction: column; gap: 8px; border: 1px solid rgba(255,255,255,0.05); }
        .stat-row { display: flex; justify-content: space-between; align-items: center; font-size: 14px; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 6px; }
        .stat-row:last-child { border: none; padding: 0; }
        .stat-val { font-weight: 900; color: white; font-size: 16px; }

        .form-group { margin-bottom: 15px; text-align: left; }
        .form-group label { display: block; margin-bottom: 5px; color: var(--text-muted); font-weight: 800; font-size: 14px; }
        .form-group input, .form-group select { 
            width: 100%; padding: 12px; background: rgba(0,0,0,0.4); 
            border: 2px solid var(--border-color); color: white; border-radius: 12px; 
            box-sizing: border-box; font-family: 'Nunito', sans-serif; font-weight: bold; outline: none;
        }
        .form-group input:focus { border-color: var(--primary); }

        .loader { border: 4px solid rgba(255,255,255,0.1); border-top: 4px solid var(--primary); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 40px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Utility Badges */
        .badge { padding: 3px 8px; border-radius: 8px; font-size: 11px; font-weight: 900; color: #fff; }
        .badge-pending { background: #ff9800; color: black; }
        .badge-success { background: #4caf50; }
        .badge-danger { background: #ff3355; }
    </style>
</head>
<body>

    <!-- LOGIN OVERLAY -->
    <div id="login-overlay">
        <div class="login-box">
            <h2 style="font-size: 42px;">🍉 FRUIT CUT<br><span style="color:#fff; font-size: 24px; -webkit-text-stroke: 1px #000;">ADMIN PANEL</span></h2>
            <form id="loginForm">
                <input type="email" id="adminEmail" placeholder="Admin Email" required>
                <input type="password" id="adminPass" placeholder="Password" required>
                <button type="submit" class="btn btn-gold" style="width: 100%; margin-top: 15px; font-size: 18px; padding: 14px;">🚀 LOGIN</button>
            </form>
            <p id="loginMsg" style="color:#ff3355; margin-top:10px; font-weight:bold;"></p>
        </div>
    </div>

    <!-- MAIN ADMIN CONTENT -->
    <div id="admin-content">
        <header class="admin-header">
            <h1 style="color:var(--primary); font-size: 32px;">🍉 FRUIT CUT <span style="font-size:16px; color:#fff; font-family:'Nunito'; font-weight:900;">SUPER ADMIN</span></h1>
            <button class="btn btn-red" id="logoutBtn">🚪 Logout</button>
        </header>

        <nav class="nav-buttons">
            <button class="nav-btn active" data-target="dashboard">📊 Dashboard</button>
            <button class="nav-btn" data-target="users">👥 Manage Users</button>
            <button class="nav-btn" data-target="withdrawals">💳 Withdrawals <span id="nav-pending-count" style="background:#ff3355; color:white; padding:2px 8px; border-radius:12px; font-size:12px; display:none; margin-left:5px;">0</span></button>
            <button class="nav-btn" data-target="manage-tasks">📋 Manage Tasks</button>
            <button class="nav-btn" data-target="promo-codes" style="border-color:var(--purple); color:#e066ff;">🎁 Promo Codes</button>
        </nav>

        <!-- DASHBOARD -->
        <div id="dashboard" class="admin-section active">
            <h2 style="color: var(--secondary); margin-bottom: 20px;">Game Overview</h2>
            <div class="dashboard-grid">
                <div class="dash-card"><h3>👥 Total Players</h3><p class="count" id="dash-total-users">...</p></div>
                <div class="dash-card"><h3>🔥 Joined Today</h3><p class="count" id="dash-daily-users">0</p></div>
                <div class="dash-card"><h3>⏳ Pending Payouts</h3><p class="count" id="dash-pending-withdrawals">0</p></div>
                <div class="dash-card"><h3>📋 Active Tasks</h3><p class="count" id="dash-active-tasks">0</p></div>
            </div>
        </div>

        <!-- WITHDRAWALS -->
        <div id="withdrawals" class="admin-section">
            <h2 style="color: var(--primary); margin-bottom: 15px;">💳 Pending Withdrawals</h2>
            <div id="withdrawals-list" class="grid-list"></div>
        </div>

        <!-- USERS -->
        <div id="users" class="admin-section">
            <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:10px; margin-bottom:20px;">
                <h2 style="color: var(--primary);">👥 User Management</h2>
                <div style="display:flex; gap:10px;">
                    <input type="text" id="userSearch" placeholder="Search ID or Username" style="padding:10px; width:220px; background:rgba(0,0,0,0.5); color:white; border:2px solid var(--border-color); border-radius:12px; font-weight:bold; outline:none;"> 
                    <button onclick="searchUser()" class="btn btn-blue">🔍 Search</button>
                    <button onclick="loadUsers()" class="btn btn-dark">🔄 Reset</button>
                </div>
            </div>
            <div id="users-list" class="grid-list"></div>
        </div>

        <!-- MANAGE TASKS (Create & List) -->
        <div id="manage-tasks" class="admin-section">
            <h2 style="color: var(--secondary); margin-bottom: 20px;">📋 Create & Manage Tasks</h2>
            
            <!-- Create Task Form -->
            <div style="background:var(--bg-card); padding:25px; border-radius:20px; border:2px solid var(--secondary); margin-bottom: 30px; max-width: 600px;">
                <h3 style="color:white; margin-bottom:15px; font-family:'Nunito'; font-weight:900;">➕ Create New Task</h3>
                <form id="createTaskForm">
                    <div class="form-group">
                        <label>Task Name</label>
                        <input type="text" id="task-name" placeholder="e.g. Join Our Telegram" required>
                    </div>
                    <div style="display:flex; gap:15px;">
                        <div class="form-group" style="flex:1;">
                            <label>Reward Coins (🪙)</label>
                            <input type="number" id="task-coins" placeholder="0" value="0" min="0">
                        </div>
                        <div class="form-group" style="flex:1;">
                            <label>Reward Diamonds (💎)</label>
                            <input type="number" id="task-gems" placeholder="0" value="0" min="0">
                        </div>
                    </div>
                    <div style="display:flex; gap:15px;">
                        <div class="form-group" style="flex:1;">
                            <label>Icon Emoji</label>
                            <input type="text" id="task-icon" placeholder="e.g. ✈️" required>
                        </div>
                        <div class="form-group" style="flex:1;">
                            <label>Sort Order (Lowest first)</label>
                            <input type="number" id="task-order" value="1" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Target URL / Bot Link</label>
                        <input type="url" id="task-link" placeholder="https://t.me/..." required>
                    </div>
                    <button type="submit" class="btn btn-green" style="width:100%; font-size:16px; padding:12px;">✅ Publish Task</button>
                    <p id="task-msg" style="text-align:center; margin-top:10px; font-weight:bold;"></p>
                </form>
            </div>

            <!-- Task List -->
            <h3 style="color: white; margin-bottom: 10px; font-family:'Nunito'; font-weight:900;">📌 Active Tasks</h3>
            <div id="tasks-list" class="grid-list"></div>
        </div>

        <!-- PROMO CODES -->
        <div id="promo-codes" class="admin-section">
            <h2 style="color: var(--purple); margin-bottom: 20px;">🎁 Generate Promo Codes</h2>
            
            <div style="background:var(--bg-card); padding:25px; border-radius:20px; border:2px solid var(--purple); max-width:500px; margin-bottom:20px;">
                <div style="display:flex; gap:15px; margin-bottom:15px;">
                    <div class="form-group" style="flex:1;">
                        <label>Reward Type</label>
                        <select id="promoType">
                            <option value="coins">🪙 Coins</option>
                            <option value="gems">💎 Diamonds</option>
                            <option value="tokens">🎮 Tokens</option>
                        </select>
                    </div>
                    <div class="form-group" style="flex:1;">
                        <label>Amount</label>
                        <input type="number" id="promoAmount" value="50" min="1">
                    </div>
                    <div class="form-group" style="flex:1;">
                        <label>Max Uses</label>
                        <input type="number" id="promoMax" value="100" min="1">
                    </div>
                </div>
                
                <button id="promoBtn" class="btn btn-purple" style="width:100%; font-size:16px;">✨ Generate Code (Valid 24h)</button>
                
                <div id="generatedCode" style="margin-top:15px; text-align:center; min-height:40px; font-weight:900;"></div>
            </div>

            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 10px;">
                <h3 style="color: white; font-family:'Nunito'; font-weight:900;">🎟️ Active Codes</h3>
                <button onclick="clearExpiredPromos()" class="btn btn-red" style="padding: 6px 12px;">🗑 Clear Expired</button>
            </div>
            <div id="promo-list" class="grid-list"></div>
        </div>
    </div>

    <!-- FIREBASE SDK 12.12.1 -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";
        import { getFirestore, collection, getDocs, getDoc, query, where, orderBy, doc, updateDoc, increment, deleteDoc, setDoc, addDoc, serverTimestamp, runTransaction, Timestamp, limit, getCountFromServer, writeBatch } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

        // Fruit Cut Game Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyDH56nAHruchExL-kZOUv1MZS8forDWOH0",
            authDomain: "fruit-cut-477ab.firebaseapp.com",
            projectId: "fruit-cut-477ab",
            storageBucket: "fruit-cut-477ab.firebasestorage.app",
            messagingSenderId: "476402093190",
            appId: "1:476402093190:web:382339ab1403de24751507",
            measurementId: "G-MCBRFK1ZEJ"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // --- AUTH LOGIC ---
        const loginOverlay = document.getElementById('login-overlay');
        const adminContent = document.getElementById('admin-content');
        
        onAuthStateChanged(auth, (user) => {
            if (user) {
                loginOverlay.style.display = 'none';
                adminContent.style.display = 'block';
                loadDashboard();
            } else {
                loginOverlay.style.display = 'flex';
                adminContent.style.display = 'none';
            }
        });

        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            signInWithEmailAndPassword(auth, document.getElementById('adminEmail').value, document.getElementById('adminPass').value)
                .catch(err => document.getElementById('loginMsg').textContent = "Access Denied. Check credentials.");
        });
        document.getElementById('logoutBtn').addEventListener('click', () => signOut(auth));

        // --- NAVIGATION ---
        document.querySelectorAll('.nav-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.nav-btn, .admin-section').forEach(el => el.classList.remove('active'));
                btn.classList.add('active');
                const t = btn.dataset.target;
                document.getElementById(t).classList.add('active');
                
                if(t === 'dashboard') loadDashboard();
                if(t === 'withdrawals') loadWithdrawals();
                if(t === 'users') loadUsers();
                if(t === 'manage-tasks') loadTasks();
                if(t === 'promo-codes') loadPromoCodes();
            });
        });

        // --- DASHBOARD ---
        async function loadDashboard() {
            try {
                const uSnap = await getCountFromServer(collection(db, "users"));
                document.getElementById('dash-total-users').textContent = uSnap.data().count;
                
                const today = new Date(); today.setHours(0,0,0,0);
                // Requires index on createdAt
                const dSnap = await getCountFromServer(query(collection(db, "users"), where("createdAt", ">=", Timestamp.fromDate(today))));
                document.getElementById('dash-daily-users').textContent = dSnap.data().count || 0;

                const wSnap = await getCountFromServer(query(collection(db, 'withdrawals'), where('status', '==', 'pending')));
                let wCount = wSnap.data().count;
                document.getElementById('dash-pending-withdrawals').textContent = wCount;
                
                let navBadge = document.getElementById('nav-pending-count');
                navBadge.textContent = wCount;
                navBadge.style.display = wCount > 0 ? 'inline-block' : 'none';
                
                const tSnap = await getCountFromServer(collection(db, 'tasks'));
                document.getElementById('dash-active-tasks').textContent = tSnap.data().count;
            } catch(e) { console.log(e); }
        }

        // --- WITHDRAWALS ---
        async function loadWithdrawals() {
            const list = document.getElementById('withdrawals-list');
            list.innerHTML = '<div class="loader"></div>';
            try {
                const q = query(collection(db, 'withdrawals'), where('status', '==', 'pending'), limit(50));
                const snap = await getDocs(q);
                if(snap.empty) { list.innerHTML = '<p style="text-align:center; width:100%;">No pending payouts! 🎉</p>'; return; }
                
                const withdrawals = snap.docs.map(d => ({id:d.id, ...d.data()})).sort((a,b) => (b.createdAt?.seconds||0) - (a.createdAt?.seconds||0));
                list.innerHTML = '';
                
                for(const wd of withdrawals) {
                    const div = document.createElement('div');
                    div.className = 'card-item';
                    div.innerHTML = `
                        <div class="card-header">
                            <div>
                                <span class="username">@${wd.username || 'Unknown'}</span><br>
                                <span class="userid" onclick="copyTxt('${wd.userId}')" style="cursor:pointer;" title="Click to copy ID">ID: ${wd.userId}</span>
                            </div>
                            <span class="badge badge-pending">PENDING</span>
                        </div>
                        <div class="card-stats">
                            <div class="stat-row"><span>Method:</span> <span class="stat-val" style="color:var(--secondary);">${(wd.method||'N/A').toUpperCase()}</span></div>
                            <div class="stat-row"><span>Amount:</span> <span class="stat-val" style="color:var(--primary); font-size:20px;">💎 ${wd.amount}</span></div>
                            <div style="margin-top:5px;">
                                <span style="font-size:12px; color:var(--text-muted);">Address/Details:</span>
                                <div style="display:flex; justify-content:space-between; align-items:center; background:rgba(0,0,0,0.5); padding:8px; border-radius:8px; margin-top:4px;">
                                    <span style="font-family:monospace; font-size:12px; word-break:break-all;">${wd.address}</span>
                                    <button class="btn btn-dark" style="padding:4px 8px; font-size:11px;" onclick="copyTxt('${wd.address}')">COPY</button>
                                </div>
                            </div>
                        </div>
                        <div style="display:flex; gap:10px; margin-top:auto;">
                            <button class="btn btn-green" style="flex:1;" onclick="actionWd('${wd.id}', 'approve')">✅ Paid</button>
                            <button class="btn btn-red" style="flex:1;" onclick="actionWd('${wd.id}', 'reject', '${wd.userId}', ${wd.amount})">❌ Refund</button>
                        </div>`;
                    list.appendChild(div);
                }
            } catch(e) { list.innerHTML = `<p style="color:red">Error: ${e.message}</p>`; }
        }

        // --- USERS ---
        async function loadUsers(searchVal = "") {
            const list = document.getElementById('users-list');
            list.innerHTML = '<div class="loader"></div>';
            try {
                let snap = [];
                const cleanSearch = searchVal.trim();
                
                if (cleanSearch) {
                    try {
                        const docSnap = await getDoc(doc(db, 'users', cleanSearch));
                        if(docSnap.exists()) { snap.push(docSnap); }
                    } catch(e) {}

                    if (snap.length === 0) {
                        const usernameClean = cleanSearch.replace('@', '');
                        const q = query(collection(db, 'users'), where('username', '==', usernameClean));
                        const querySnap = await getDocs(q);
                        querySnap.forEach(d => snap.push(d));
                    }
                } else {
                    const q = query(collection(db, 'users'), limit(50)); // Add orderBy if indexed
                    const querySnap = await getDocs(q);
                    querySnap.forEach(d => snap.push(d));
                }

                list.innerHTML = '';
                if(!snap || snap.length === 0) { list.innerHTML = '<p>No Users Found.</p>'; return; }
                
                snap.forEach(d => {
                    const u = d.data();
                    const isBan = u.isBanned || false;
                    const div = document.createElement('div');
                    div.className = `card-item ${isBan?'banned-user':''}`;
                    div.innerHTML = `
                        <div class="card-header">
                            <div>
                                <span class="username">@${u.username || 'unknown'}</span><br>
                                <span class="userid" onclick="copyTxt('${d.id}')" style="cursor:pointer;" title="Copy ID">ID: ${d.id}</span>
                            </div>
                            ${isBan ? '<span class="badge badge-danger">BANNED</span>' : ''}
                        </div>
                        <div class="card-stats">
                            <div class="stat-row"><span>🪙 Coins:</span> <span class="stat-val" style="color:#ffcc00;">${u.coins||0}</span></div>
                            <div class="stat-row"><span>💎 Diamonds:</span> <span class="stat-val" style="color:#4af;">${u.gems||0}</span></div>
                            <div class="stat-row"><span>🎮 Tokens:</span> <span class="stat-val" style="color:#cf6fef;">${u.tokens||0}</span></div>
                            <div class="stat-row"><span>🔗 Referrals:</span> <span class="stat-val">${u.referCount||0}</span></div>
                        </div>
                        <div style="display:flex; gap:5px; margin-top:5px; flex-wrap:wrap;">
                            <button class="btn btn-gold" style="flex:1; padding:6px; font-size:12px;" onclick="editField('${d.id}', 'coins', '🪙 Coins')">Edit 🪙</button>
                            <button class="btn btn-blue" style="flex:1; padding:6px; font-size:12px;" onclick="editField('${d.id}', 'gems', '💎 Diamonds')">Edit 💎</button>
                            <button class="btn btn-purple" style="flex:1; padding:6px; font-size:12px;" onclick="editField('${d.id}', 'tokens', '🎮 Tokens')">Edit 🎮</button>
                        </div>
                        <button class="btn ${isBan?'btn-green':'btn-red'}" style="margin-top:5px;" onclick="toggleBan('${d.id}', ${isBan})">${isBan?'✅ UNBAN USER':'🚫 BAN USER'}</button>
                    `;
                    list.appendChild(div);
                });
            } catch(e) { list.innerHTML = `<p>Error: ${e.message}</p>`; }
        }

        // --- TASKS ---
        document.getElementById('createTaskForm').addEventListener('submit', async(e) => {
            e.preventDefault();
            const msg = document.getElementById('task-msg');
            const btn = e.target.querySelector('button[type=submit]');
            btn.disabled = true; btn.textContent = 'Publishing...';
            try {
                await addDoc(collection(db, 'tasks'), {
                    name:  document.getElementById('task-name').value.trim(),
                    link:  document.getElementById('task-link').value.trim(),
                    icon:  document.getElementById('task-icon').value.trim(),
                    coins: parseInt(document.getElementById('task-coins').value) || 0,
                    gems:  parseInt(document.getElementById('task-gems').value) || 0,
                    order: parseInt(document.getElementById('task-order').value) || 1,
                    createdAt: serverTimestamp()
                });
                msg.style.color = 'var(--success)';
                msg.textContent = '✅ Task Published!';
                e.target.reset();
                loadTasks();
            } catch(err) {
                msg.style.color = 'var(--danger)';
                msg.textContent = '❌ Error: ' + err.message;
            }
            btn.disabled = false; btn.textContent = '✅ Publish Task';
            setTimeout(()=> msg.textContent='', 3000);
        });

        async function loadTasks() {
            const list = document.getElementById('tasks-list');
            list.innerHTML = '<div class="loader"></div>';
            try {
                const q = query(collection(db,'tasks'), orderBy('order','asc'));
                const snap = await getDocs(q);
                list.innerHTML = '';
                if(snap.empty) { list.innerHTML = '<p style="text-align:center; color:#aaa; width:100%;">No tasks found.</p>'; return; }

                snap.forEach(d => {
                    const t = d.data();
                    let rewardTxt = '';
                    if(t.coins > 0) rewardTxt += `🪙 ${t.coins}  `;
                    if(t.gems > 0) rewardTxt += `💎 ${t.gems}`;
                    
                    const div = document.createElement('div');
                    div.className = 'card-item';
                    div.innerHTML = `
                        <div class="card-header">
                            <div style="display:flex; align-items:center; gap:10px;">
                                <div style="font-size:30px;">${t.icon||'📋'}</div>
                                <div>
                                    <h4 style="margin:0; font-family:'Nunito'; font-weight:900; font-size:16px;">${t.name}</h4>
                                    <div style="color:var(--primary); font-weight:bold; font-size:14px;">Reward: ${rewardTxt || 'None'}</div>
                                </div>
                            </div>
                        </div>
                        <div class="card-stats">
                            <div class="stat-row"><span>Sort Order:</span> <span class="stat-val">${t.order||1}</span></div>
                            <div class="stat-row"><span>URL:</span> <span class="stat-val" style="color:var(--secondary); font-size:12px; text-align:right; max-width:200px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${t.link || 'N/A'}</span></div>
                        </div>
                        <button class="btn btn-red" style="margin-top:auto;" onclick="delDoc('tasks','${d.id}')">🗑 Delete Task</button>
                    `;
                    list.appendChild(div);
                });
            } catch(err) { list.innerHTML = `<p style="color:red; text-align:center;">Error: ${err.message}</p>`; }
        }

        // --- PROMO CODES ---
        document.getElementById('promoBtn').addEventListener('click', async()=>{
            const type = document.getElementById('promoType').value;
            const amount = parseFloat(document.getElementById('promoAmount').value);
            const max = parseInt(document.getElementById('promoMax').value);

            if(!amount || amount <= 0) return alert("Invalid Amount");
            
            const code = 'FC' + Math.floor(1000+Math.random()*9000).toString(); // Format: FCxxxx
            const exp = new Date(); exp.setHours(exp.getHours()+24);
            
            await setDoc(doc(db,'promo_codes',code), {
                code, rewardType: type, rewardAmount: amount, maxUses: max,
                currentUses: 0, isActive: true, usersClaimed: [], 
                expiresAt: Timestamp.fromDate(exp), createdAt: serverTimestamp()
            });

            document.getElementById('generatedCode').innerHTML = `
                <span style="color:var(--text-muted);">New Code:</span> 
                <span style="color:var(--primary); font-size:24px; font-family:'Luckiest Guy'; letter-spacing:2px; margin:0 10px;">${code}</span>
                <br><span style="color:white; font-size:14px;">(+${amount} ${type})</span>
            `;
            loadPromoCodes();
        });

        async function loadPromoCodes(){
            const list = document.getElementById('promo-list');
            list.innerHTML='<div class="loader"></div>';
            const snap = await getDocs(query(collection(db,'promo_codes'), orderBy('createdAt','desc'), limit(30)));
            list.innerHTML='';
            
            const now = new Date();
            snap.forEach(d=>{
                const p = d.data();
                let isExp = p.expiresAt ? (now > p.expiresAt.toDate()) : false;
                
                let icon = p.rewardType === 'gems' ? '💎' : p.rewardType === 'tokens' ? '🎮' : '🪙';

                const div=document.createElement('div'); div.className='card-item';
                div.innerHTML = `
                    <div class="card-header">
                        <h3 style="color:${isExp ? '#777' : 'var(--purple)'}; margin:0;">${p.code}</h3>
                        ${isExp ? '<span class="badge badge-danger">EXPIRED</span>' : '<span class="badge badge-success">ACTIVE</span>'}
                    </div>
                    <div class="card-stats">
                        <div class="stat-row"><span>Reward:</span> <b>${icon} ${p.rewardAmount}</b></div>
                        <div class="stat-row"><span>Uses:</span> <b>${p.currentUses}/${p.maxUses}</b></div>
                        <div class="stat-row"><span style="font-size:12px; color:var(--text-muted);">Exp: ${p.expiresAt ? p.expiresAt.toDate().toLocaleString() : 'N/A'}</span></div>
                    </div>
                    <button class="btn btn-dark" style="margin-top:auto;" onclick="delDoc('promo_codes','${d.id}')">Delete</button>
                `;
                list.appendChild(div);
            });
        }

        window.clearExpiredPromos = async () => {
            if(!confirm("Delete ALL expired codes?")) return;
            const now = new Date();
            const q = query(collection(db, "promo_codes"), where("expiresAt", "<=", Timestamp.fromDate(now)));
            try {
                const snap = await getDocs(q);
                if(snap.empty) { alert("No expired codes found."); return; }
                const batch = writeBatch(db);
                snap.forEach(d => { batch.delete(d.ref); });
                await batch.commit();
                alert(`Deleted ${snap.size} codes.`);
                loadPromoCodes();
            } catch(e) { alert("Error: " + e.message); }
        };

        // --- GLOBAL ACTIONS ---
        window.copyTxt = (txt) => { navigator.clipboard.writeText(txt); alert("Copied to clipboard!"); }
        window.searchUser = () => loadUsers(document.getElementById('userSearch').value);
        window.toggleBan = async (uid, isBan) => { 
            if(confirm(isBan ? "Unban this user?" : "Ban this user?")) { 
                await updateDoc(doc(db,'users',uid), { isBanned: !isBan }); 
                loadUsers(document.getElementById('userSearch').value); 
            } 
        }
        
        window.editField = async (uid, field, label) => { 
            const val = prompt(`Enter amount to ADD or DEDUCT for ${label}:\n(e.g., 50 to add, -50 to deduct)`); 
            if(val && !isNaN(val)) { 
                await updateDoc(doc(db,'users',uid), { [field]: increment(parseFloat(val)) }); 
                alert(`${label} updated!`);
                loadUsers(document.getElementById('userSearch').value); 
            }
        }
        
        window.actionWd = async (id, action, uid, amount) => {
            if(!confirm(`Are you sure you want to ${action.toUpperCase()} this payout?`)) return;
            try {
                const wRef = doc(db, 'withdrawals', id);
                if(action === 'approve') {
                    await updateDoc(wRef, { status: 'approved' });
                } else {
                    // Reject: Refund Diamonds (gems) to the user
                    await runTransaction(db, async(t) => { 
                        t.update(wRef, { status: 'rejected' }); 
                        t.update(doc(db,'users',uid), { gems: increment(amount) }); 
                    });
                }
                loadWithdrawals(); loadDashboard();
            } catch(e) { alert("Error: " + e); }
        }

        window.delDoc = async(col, id) => { 
            if(confirm("Delete this item permanently?")) { 
                await deleteDoc(doc(db,col,id)); 
                if(col==='tasks') loadTasks(); 
                if(col==='promo_codes') loadPromoCodes(); 
            } 
        }

    </script>
</body>
</html>
